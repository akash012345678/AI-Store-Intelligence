databases:
  # Database Service (PostgreSQL 15)
  - name: retailpulse-postgres
    plan: free
    ipAllowList: [] # Only allow internal connection within the Render account

services:
  # Backend Web Service (FastAPI)
  - type: web
    name: retailpulse-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: . # Root context required to copy backend/ and data/
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: retailpulse-postgres
          property: connectionString
      - key: PORT
        value: 8000

  # Frontend Web Service (Nginx)
  - type: web
    name: retailpulse-frontend
    env: docker
    dockerfilePath: frontend/Dockerfile
    dockerContext: frontend # Subdirectory context required to copy HTML assets
    plan: free
    envVars:
      - key: PORT
        value: 80
